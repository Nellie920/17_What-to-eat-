{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column h-100">
    <div class="mb-3 text-end" style="color: #cbd5e1; font-size: 0.9rem;">
        <span>好感: {{ state.affection }}</span> | 
        <span>信任: {{ state.trust }}</span> | 
        <span>恐懼: {{ state.fear }}</span> | 
        <span>好奇: {{ state.curiosity }}</span>
    </div>

    <div class="story-box glass-panel shadow-lg mb-4">
        <p class="mb-0" style="white-space: pre-wrap;">{{ story.text }}</p>
    </div>
    
    <div class="options-container">
        {% for choice in story.choices %}
        <form action="{{ url_for('story.make_choice', node_id=story.node_id, choice_id=choice.id) }}" method="POST" class="d-grid mb-3">
            <button type="submit" class="option-btn fs-5 text-start">
                {{ choice.text }}
            </button>
        </form>
        {% endfor %}
        
        <form action="{{ url_for('save.create_save') }}" method="POST" class="mt-4 text-end">
            <input type="hidden" name="node_id" value="{{ story.node_id }}">
            <button type="submit" class="btn btn-glass px-4 py-2"><i class="fa-solid fa-save"></i> 儲存目前進度</button>
        </form>
    </div>
</div>
{% endblock %}
