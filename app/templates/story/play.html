{% extends "base.html" %}

{% block content %}
<div class="d-flex flex-column h-100">
    <div class="story-box glass-panel shadow-lg">
        <p class="mb-0">{{ story.text }}</p>
    </div>
    
    <div class="options-container">
        <!-- 虛擬選項供示範 -->
        <a href="{{ url_for('story.play_story', node_id='chapter1') }}" class="option-btn fs-5">
            1. 繼續前進，探索前方的未知。
        </a>
        <a href="{{ url_for('story.play_story', node_id='secret_ending') }}" class="option-btn fs-5">
            2. 觸碰那發光的神秘水晶。
        </a>
        
        <form action="{{ url_for('save.create_save') }}" method="POST" class="mt-4 text-end">
            <input type="hidden" name="node_id" value="{{ story.node_id }}">
            <button type="submit" class="btn btn-glass px-4 py-2"><i class="fa-solid fa-save"></i> 儲存目前進度</button>
        </form>
    </div>
</div>
{% endblock %}
