<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>愛與選擇之書 Whispers of Fate</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    
    {% if session.get('user_id') %}
    <!-- Sidebar for logged in users -->
    <nav class="sidebar glass-panel">
        <h3 class="section-title">Whispers<br>of Fate</h3>
        
        <a href="{{ url_for('story.home') }}" class="nav-item">
            <i class="fa-solid fa-book-open"></i> 今日章節
        </a>
        <a href="{{ url_for('save.list_saves') }}" class="nav-item">
            <i class="fa-solid fa-floppy-disk"></i> 載入存檔
        </a>
        <a href="{{ url_for('user.settings') }}" class="nav-item">
            <i class="fa-solid fa-gear"></i> 個人設定
        </a>
        <a href="{{ url_for('user.achievements') }}" class="nav-item">
            <i class="fa-solid fa-trophy"></i> 畫廊成就
        </a>
        <a href="{{ url_for('auth.logout') }}" class="nav-item" style="margin-top: auto;">
            <i class="fa-solid fa-right-from-bracket"></i> 登出
        </a>
    </nav>
    {% endif %}

    <main class="main-content">
        <!-- Flash Messages -->
        <div class="container mt-3">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <!-- Main Content Block -->
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
