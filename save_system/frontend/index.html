<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Game (Main Site Mock)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- 只需要引入這兩個檔案，就會自動在右下角生成存檔系統！ -->
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    
    <style>
        /* 模擬主要網站的樣式 (非 Widget 的樣式) */
        body {
            font-family: 'Outfit', sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .main-content {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
        }
        .main-content h1 {
            color: #ec4899;
        }
        .story-placeholder {
            margin-top: 50px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        button.next-scene {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1>主網站劇情畫面 (Mock)</h1>
        <div class="story-placeholder">
            <h2 id="sceneTitle">第一章：覺醒</h2>
            <p id="sceneText">你睜開眼睛，發現自己躺在一個陌生的房間裡...</p>
            <button class="next-scene" onclick="window.saveWidget.triggerSave(1, '探索房間', { health: 100 })">推進劇情並自動存檔</button>
        </div>
    </div>
</body>
</html>
