<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就解鎖展示</title>
    <style>
        /* 基本頁面樣式設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            color: #333;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #ff6b6b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #ff4757;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Toast 容器，固定在畫面上方居中 */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Toast 單個提示框樣式 */
        .toast {
            background-color: #ffffff;
            color: #333333;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            border-left: 6px solid #f1c40f;
            /* 綁定動畫：0.5秒滑入，然後停留3秒，最後0.5秒淡出 (3s + 0.5s = 3.5s時觸發) */
            animation: slideIn 0.5s ease-out forwards, fadeOut 0.5s ease-in 3.5s forwards;
            opacity: 0;
        }

        /* 定義從上方滑入的動畫 */
        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 定義自動淡出的動畫 */
        @keyframes fadeOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(-50%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1>成就系統測試</h1>
    <div class="btn-container">
        <!-- 點擊觸發成就解鎖功能 -->
        <button onclick="unlockAchievement(1, 1)">解鎖成就：達成初次結局</button>
        <button onclick="unlockAchievement(1, 2)">解鎖成就：找到隱藏彩蛋</button>
        <button onclick="unlockAchievement(1, 3)">解鎖成就：母胎單身狗</button>
    </div>

    <!-- 提示框的容器 -->
    <div id="toast-container"></div>

    <script>
        // 解鎖成就的非同步函數
        async function unlockAchievement(userId, achievementId) {
            try {
                const response = await fetch('/api/achievement/unlock', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        achievement_id: achievementId
                    })
                });

                const result = await response.json();

                // 根據後端回傳的結果顯示對應的 Toast
                if (response.ok && result.success) {
                    showToast('🏆 恭喜獲得成就！');
                } else if (!result.success && result.message === "已解鎖過此成就") {
                    showToast('ℹ️ 已經解鎖過此成就了喔！', '#3498db');
                } else {
                    showToast('❌ 解鎖失敗：' + result.message, '#e74c3c');
                }
            } catch (error) {
                console.error('API 請求失敗:', error);
                showToast('❌ 系統錯誤，請稍後再試', '#e74c3c');
            }
        }

        // 顯示 Toast 提示框的函數
        function showToast(message, color = '#f1c40f') {
            const container = document.getElementById('toast-container');
            
            // 建立 Toast 元素
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = color;
            toast.innerHTML = `<span>${message}</span>`;
            
            // 加入到容器中，觸發動畫
            container.appendChild(toast);

            // 動畫總時長約為 4 秒 (0.5滑入 + 3停留 + 0.5滑出)
            // 在 4 秒後將元素從 DOM 移除，避免佔用資源
            setTimeout(() => {
                if (container.contains(toast)) {
                    container.removeChild(toast);
                }
            }, 4000);
        }
    </script>
</body>
</html>
