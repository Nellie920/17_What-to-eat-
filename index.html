<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊校舍的約定 - 戀愛互動故事</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>舊校舍的約定</h1>
            <div id="stats" class="stats-bar">
                <!-- 動態顯示數值 -->
            </div>
        </header>

        <main class="game-box">
            <div id="story-text" class="story-text glass-panel">
                故事載入中...
            </div>
            
            <div id="choices" class="choices-container">
                <!-- 動態按鈕 -->
            </div>

            <div id="ending-box" class="ending-box glass-panel hidden">
                <h2 id="ending-title">結局標題</h2>
                <p id="ending-desc">結局描述</p>
                <button id="restart-btn" class="btn primary-btn">重新開始故事</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
